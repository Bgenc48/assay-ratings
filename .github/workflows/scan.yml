# The heartbeat: scans every registry token against live chain state,
# commits the refreshed data (the append-only trust time series), and
# redeploys the site. Grades on assayratings.com are exactly what this
# workflow committed — git history is the tamper-evidence.
name: Scan

on:
  schedule:
    - cron: "17 5 * * *" # daily
  workflow_dispatch:

concurrency:
  group: scan
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits refreshed data/ only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - name: Discover new tokens
        run: npm run discover
      - name: Live scan
        run: npm run scan
      - name: Send alerts (no-op without Telegram secrets)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-alerts.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "assay-scanner"
          git config user.email "scanner@assayratings.com"
          git add data/ registry/discovered.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "scan: refresh ratings data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

  deploy:
    # Pushes made with GITHUB_TOKEN don't trigger other workflows, so the
    # scan pipeline deploys Pages itself after committing.
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main # include the data commit from the scan job
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npm run build:site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
